<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Review & Edit Tool</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="logo-icon">🔍</span>
                <h1>OCR Reviewer</h1>
            </div>
            <div class="controls">
                <button id="prevBtn" class="nav-btn">← Previous</button>
                <div class="progress-wrapper">
                    <div class="page-indicator">
                        <input type="number" id="pageInput" min="1" value="1" title="Go to page">
                        <span id="totalPages"> / 5</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <button id="nextBtn" class="nav-btn">Next →</button>
            </div>
        </header>

        <main class="content">
            <section class="image-viewer card">
                <div class="card-header">
                    <h2>Image Preview</h2>
                </div>
                <div class="image-container">
                    <img id="receiptImage" src="" alt="OCR Target Image">
                </div>
            </section>

            <section class="edit-panel card">
                <div class="card-header">
                    <h2>Extracted Information</h2>
                    <span class="status-badge" id="saveStatus">Synced</span>
                </div>
                <div class="fields-container" id="fieldsList">
                    <!-- Fields will be dynamic -->
                </div>
                <div class="actions" style="display: flex; gap: 10px;">
                    <button id="yagiBtn" class="primary-btn">원본</button>
                    <button id="saveBtn" class="primary-btn">Confirm</button>
                </div>
            </section>
        </main>
    </div>

    <div class="toast" id="toast">Changes saved successfully!</div>

    <script src="/static/script.js"></script>
</body>

</html>
